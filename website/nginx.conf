# /etc/nginx/sites-available/laves-website

server {
    listen 80;
    server_name laves.com www.laves.com;

    # Frontend (React build)
    root /var/www/laves-website/frontend/dist;
    index index.html;

    # Uploads (ürün görselleri)
    location /uploads/ {
        alias /var/www/laves-website/backend/uploads/;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
